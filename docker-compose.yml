services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    init: true
    ports:
      - "3000:3000"
    volumes:
      - /var/platforma/uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: https://platformaapp.ru
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      SMTP_HOST: mail.hosting.reg.ru
      SMTP_PORT: "465"
      SMTP_SECURE: "true"
      SMTP_USER: platformaapp@platformaapp.ru
      SMTP_PASS: 8QLq8vVu4iVi7bn
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      YOOKASSA_BASE_URL: ${YOOKASSA_BASE_URL:-https://api.yookassa.ru/v3}
      YOOKASSA_WEBHOOK_URL: ${YOOKASSA_WEBHOOK_URL}
      MY_OWN_CONF_API_KEY: ${MY_OWN_CONF_API_KEY}
    restart: unless-stopped

# Uploads are stored on the host at /var/platforma/uploads (bind mount).
# Create it once: sudo mkdir -p /var/platforma/uploads
# This survives docker-compose down -v and is accessible directly by nginx.
#
# Recommended nginx block (add to your server {} section):
#
#   # Serve uploaded files directly — fast, no backend involved
#   location /api/uploads/ {
#       alias /var/platforma/uploads/;
#       expires 30d;
#       add_header Cache-Control "public, immutable";
#   }
#
#   # Proxy all other API requests to the backend
#   location /api/ {
#       proxy_pass http://127.0.0.1:3000;
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#   }
#
#   # React SPA
